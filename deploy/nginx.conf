# /etc/nginx/sites-available/divorcetalk.in
#
# Reverse proxy for DivorceTalk.in (Node app on 127.0.0.1:3000).
# Replace `divorcetalk.in` with your actual domain. After certbot --nginx runs
# it'll add the SSL block; the HTTP block will be auto-rewritten to redirect.

# Cache static assets aggressively. The Vite bundle hashes filenames so
# busting is automatic.
map $sent_http_content_type $cache_control_immutable {
    default                              "public, max-age=600";
    ~*application/javascript             "public, max-age=31536000, immutable";
    ~*text/css                           "public, max-age=31536000, immutable";
    ~*image/(png|jpg|jpeg|gif|webp|svg|x-icon|vnd.microsoft.icon)
                                         "public, max-age=31536000, immutable";
    ~*font/                              "public, max-age=31536000, immutable";
}

upstream divorcetalk_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name divorcetalk.in www.divorcetalk.in;

    # Don't expose nginx version.
    server_tokens off;

    # Reasonable upload limit for the contact form & post bodies (matches
    # the 50MB body-limit in api/boot.ts).
    client_max_body_size 50M;

    # Real IP propagation (so the contact-router sees x-forwarded-for).
    real_ip_header X-Forwarded-For;
    set_real_ip_from 127.0.0.1;

    # Gzip (Brotli is even better if you have ngx_brotli).
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        application/manifest+json
        image/svg+xml
        font/ttf
        font/otf;

    # Service worker should NEVER be cached past the install — we want
    # updates to roll out the next visit.
    location = /sw.js {
        proxy_pass http://divorcetalk_app;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # Manifest can be cached for a short while.
    location = /manifest.webmanifest {
        proxy_pass http://divorcetalk_app;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=3600";
    }

    # Cache-immutable for hashed assets.
    location ~* /assets/ {
        proxy_pass http://divorcetalk_app;
        proxy_set_header Host $host;
        add_header Cache-Control $cache_control_immutable;
    }

    # Everything else goes to the Node app (API + SPA fallback handled inside).
    location / {
        proxy_pass http://divorcetalk_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Long timeout so streaming / long polls don't die.
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Security headers — soft for a community site, not a bank.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}
